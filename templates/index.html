{{/* StdGee sample template */}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ed;
        --card: #fffdfa;
        --line: #d6ccb8;
        --ink: #1e1c17;
        --muted: #6e6555;
        --accent: #0f766e;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
          linear-gradient(180deg, #fbf8f0 0%, var(--bg) 100%);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 56px 24px 72px;
      }

      .hero {
        display: grid;
        gap: 20px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        font-size: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        line-height: 0.95;
      }

      .card {
        background: color-mix(in srgb, var(--card) 92%, white 8%);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 16px 50px rgba(30, 28, 23, 0.08);
      }

      p {
        line-height: 1.7;
      }

      .muted {
        color: var(--muted);
      }

      .routes {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        padding: 0;
        list-style: none;
      }

      .routes li {
        border-left: 3px solid var(--accent);
        padding-left: 12px;
        font-family: "IBM Plex Mono", Consolas, monospace;
      }

      code {
        font-family: "IBM Plex Mono", Consolas, monospace;
        background: rgba(15, 118, 110, 0.08);
        padding: 0.1rem 0.35rem;
        border-radius: 999px;
      }

      @media (max-width: 640px) {
        main {
          padding: 36px 18px 56px;
        }

        .card {
          padding: 20px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">StdGee + net/http</p>
        <h1>{{ .title }}</h1>
        <p class="muted">{{ .message }}</p>
      </section>

      <section class="card">
        <p><strong>Current time:</strong> <code>{{ FormatAsDateTime .now }}</code></p>

        {{ if .items }}
          <p class="muted">Try these routes after the server starts:</p>
          <ul class="routes">
            {{ range .items }}
              <li>{{ . }}</li>
            {{ end }}
          </ul>
        {{ end }}
      </section>
    </main>
  </body>
</html>
